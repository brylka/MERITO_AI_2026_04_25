<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moja pierwsza apka</title>
</head>
<body>
    <h1>Moja pierwsza aplikacja webowa</h1>
    <input type="text" id="prompt" required>
    <button id="send">Wyślij do llm</button>
    <div id="chat-gpt"></div>
    <script>
        let history = []
        document.getElementById('send').addEventListener('click', async () => {
            const tekst = document.getElementById('prompt')
            const chat = document.getElementById('chat-gpt')
            let prompt = tekst.value
            tekst.value = ''
            chat.innerHTML += `<p>user: ${prompt}</p>`
            history.push({role: "user", parts: [{text: prompt}]})
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({history})
            })
            const data = await response.json()
            answer = data.answer
            history.push({role: "model", parts: [{text: answer}]})

            chat.innerHTML += `<p>model: ${answer}</p>`
        })

    </script>

</body>
</html>
